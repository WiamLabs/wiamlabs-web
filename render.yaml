# Render Blueprint — WiamLabs public site (wiamlabs.com)
# https://render.com/docs/infrastructure-as-code
#
# DEPLOY:
#   1. Push this repo to GitHub (WiamLabs/wiamlabs-web)
#   2. render.com → New → Blueprint
#   3. Connect WiamLabs/wiamlabs-web → Apply
#   4. Fill secret env vars when prompted
#   5. Settings → Custom Domains → add wiamlabs.com
#
# FREE TIER: spins down after 15min idle (~30s cold start). Use Starter ($7/mo) for always-on.

services:
  - type: web
    name: wiamlabs-web
    runtime: node
    region: frankfurt
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NEXT_PUBLIC_SITE_URL
        value: https://wiamlabs.com
      - key: NEXT_PUBLIC_WIAMAPP_URL
        value: https://wiamapp.com
      - key: NEXT_PUBLIC_WIAMTRADE_URL
        value: https://wiamtrade.wiamlabs.com
      - key: BREVO_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        value: martin@wiamlabs.com
      - key: CONTACT_FROM_EMAIL
        value: hello@wiamlabs.com
      - key: CONTACT_FROM_NAME
        value: WiamLabs
      - key: CMS_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_CMS_API_URL
        sync: false
      - key: REVALIDATE_SECRET
        generateValue: true
